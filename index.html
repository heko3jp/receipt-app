<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>レシート読取アプリ</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #0a0a0f; color: #e8e4d9; font-family: 'Noto Serif JP', serif; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    const CATEGORIES = ['交通費', '接待・交際費', '消耗品費', '通信費', '外注費', 'その他'];
    const fmt = (n) => n == null ? '—' : '¥' + Number(n).toLocaleString();
    const cs = { card: { background:'#111118', borderRadius:12, padding:20, border:'1px solid #1e1e2e', marginBottom:16 } };

    function loadRecords() {
      try { return JSON.parse(localStorage.getItem('receipt_records') || '[]'); } catch { return []; }
    }
    function saveRecords(records) {
      const lite = records.map(r => ({ ...r, image: r.image?.substring(0, 200) + '...' }));
      try { localStorage.setItem('receipt_records', JSON.stringify(records)); } catch {
        try { localStorage.setItem('receipt_records', JSON.stringify(lite)); } catch {}
      }
    }

    async function pdfPageToImage(file, pageNum = 1) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const totalPages = pdf.numPages;
      const page = await pdf.getPage(Math.min(pageNum, totalPages));
      const viewport = page.getViewport({ scale: 1.5 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width; canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      return { dataUrl: canvas.toDataURL('image/jpeg', 0.8), totalPages };
    }

    async function analyzeImage(base64, apiKey) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
          { type: 'text', text: `この画像は請求書または領収書です。JSON形式のみで返してください:\n{"type":"請求書 or 領収書","date":"YYYY-MM-DD","vendor":"取引先名","amount":数値,"tax":数値,"items":["品目1"],"category":"${CATEGORIES.join(' or ')}"}` }
        ]}] })
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e?.error?.message || 'APIエラー'); }
      const data = await res.json();
      try { return JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim()); } catch { return null; }
    }

    function ChartComponent({ records }) {
      const canvasRef = React.useRef();
      const chartRef = React.useRef();
      const [view, setView] = React.useState('monthly');

      React.useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) chartRef.current.destroy();

        if (view === 'monthly') {
          const months = {};
          records.forEach(r => {
            const m = (r.date || '').substring(0, 7);
            if (m) months[m] = (months[m] || 0) + (r.amount || 0);
          });
          const labels = Object.keys(months).sort();
          const data = labels.map(k => months[k]);
          chartRef.current = new Chart(canvasRef.current, {
            type: 'bar',
            data: { labels, datasets: [{ label: '月次合計', data, backgroundColor: '#c8a96e88', borderColor: '#c8a96e', borderWidth: 1 }] },
            options: { responsive: true, plugins: { legend: { labels: { color: '#888' } } }, scales: { x: { ticks: { color: '#666' } }, y: { ticks: { color: '#666', callback: v => '¥'+v.toLocaleString() } } } }
          });
        } else {
          const cats = {};
          records.forEach(r => { if (r.category) cats[r.category] = (cats[r.category] || 0) + (r.amount || 0); });
          const labels = Object.keys(cats);
          const data = labels.map(k => cats[k]);
          chartRef.current = new Chart(canvasRef.current, {
            type: 'doughnut',
            data: { labels, datasets: [{ data, backgroundColor: ['#c8a96e','#8a6a3e','#5a7a5a','#3a5a7a','#7a3a5a','#5a5a7a'] }] },
            options: { responsive: true, plugins: { legend: { labels: { color: '#888' } } } }
          });
        }
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [records, view]);

      return (
        <div style={{ ...cs.card }}>
          <div style={{ display:'flex', gap:8, marginBottom:16 }}>
            {[['monthly','月次'], ['category','カテゴリ']].map(([k,l]) => (
              <button key={k} onClick={() => setView(k)} style={{ padding:'6px 14px', border:'none', borderRadius:8, background: view===k ? '#c8a96e' : '#1e1e2e', color: view===k ? '#0a0a0f' : '#888', cursor:'pointer', fontSize:12 }}>{l}</button>
            ))}
          </div>
          <canvas ref={canvasRef} />
        </div>
      );
    }

    function App() {
      const [apiKey, setApiKey] = React.useState(() => localStorage.getItem('anthropic_key') || '');
      const [keySaved, setKeySaved] = React.useState(() => !!localStorage.getItem('anthropic_key'));
      const [records, setRecords] = React.useState(loadRecords);
      const [loading, setLoading] = React.useState(false);
      const [loadingMsg, setLoadingMsg] = React.useState('');
      const [error, setError] = React.useState(null);
      const [tab, setTab] = React.useState('upload');
      const [filterStatus, setFilterStatus] = React.useState('all');
      const fileRef = React.useRef();

      const updateRecords = (newRecords) => { setRecords(newRecords); saveRecords(newRecords); };
      const saveKey = () => { localStorage.setItem('anthropic_key', apiKey); setKeySaved(true); };
      const togglePaid = (id) => updateRecords(records.map(r => r.id === id ? { ...r, paid: !r.paid } : r));
      const deleteRecord = (id) => { if (confirm('削除しますか？')) updateRecords(records.filter(r => r.id !== id)); };

      const process = async (file) => {
        if (!file) return;
        const isPDF = file.type === 'application/pdf';
        const isImage = file.type.startsWith('image/');
        if (!isPDF && !isImage) { setError('JPG・PNG・PDFのみ対応しています'); return; }
        setError(null); setLoading(true);
        try {
          if (isPDF) {
            const { dataUrl, totalPages } = await pdfPageToImage(file, 1);
            setLoadingMsg(`PDF読み取り中... (1/${totalPages}ページ)`);
            const result = await analyzeImage(dataUrl.split(',')[1], apiKey);
            if (result) {
              const newRec = { id: Date.now(), ...result, image: dataUrl, fileType: 'PDF', totalPages, paid: false };
              updateRecords([newRec, ...records]);
              setTab('list');
            }
            if (totalPages > 1) {
              for (let p = 2; p <= Math.min(totalPages, 5); p++) {
                setLoadingMsg(`PDF読み取り中... (${p}/${totalPages}ページ)`);
                const { dataUrl: dUrl } = await pdfPageToImage(file, p);
                const res = await analyzeImage(dUrl.split(',')[1], apiKey);
                if (res && res.amount) {
                  updateRecords(prev => [{ id: Date.now() + p, ...res, image: dUrl, fileType: `PDF p.${p}`, paid: false }, ...prev]);
                }
              }
            }
          } else {
            setLoadingMsg('画像読み取り中...');
            const dataUrl = await new Promise(resolve => { const r = new FileReader(); r.onload = e => resolve(e.target.result); r.readAsDataURL(file); });
            const result = await analyzeImage(dataUrl.split(',')[1], apiKey);
            if (result) { updateRecords([{ id: Date.now(), ...result, image: dataUrl, fileType: '画像', paid: false }, ...records]); setTab('list'); }
          }
        } catch(err) { setError(err.message); }
        finally { setLoading(false); setLoadingMsg(''); }
      };

      const totalAmount = records.reduce((s, r) => s + (r.amount || 0), 0);
      const unpaidAmount = records.filter(r => !r.paid).reduce((s, r) => s + (r.amount || 0), 0);
      const paidAmount = records.filter(r => r.paid).reduce((s, r) => s + (r.amount || 0), 0);
      const filteredRecords = filterStatus === 'all' ? records : records.filter(r => filterStatus === 'unpaid' ? !r.paid : r.paid);

      const exportCSV = () => {
        const rows = [['日付','取引先','種別','カテゴリ','税込金額','消費税','支払状況','ファイル種別'].join(','),
          ...records.map(r => [r.date,r.vendor,r.type,r.category,r.amount,r.tax,r.paid?'支払済':'未払い',r.fileType].join(','))];
        const blob = new Blob(['\uFEFF'+rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'receipts.csv'; a.click();
      };

      return (
        <div style={{ minHeight:'100vh', background:'#0a0a0f', color:'#e8e4d9', fontFamily:"'Noto Serif JP',serif", display:'flex', flexDirection:'column', alignItems:'center', padding:'0 16px 80px' }}>
          <div style={{ width:'100%', maxWidth:480, padding:'28px 0 12px', borderBottom:'1px solid #2a2a3a', marginBottom:20 }}>
            <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', marginBottom:12 }}>
              <div><div style={{ fontSize:10, letterSpacing:4, color:'#555', textTransform:'uppercase', marginBottom:4 }}>経理自動化</div><div style={{ fontSize:24 }}>レシート読取</div></div>
              <div style={{ textAlign:'right' }}><div style={{ fontSize:10, color:'#555', marginBottom:2 }}>合計</div><div style={{ fontSize:18, color:'#c8a96e' }}>{fmt(totalAmount)}</div></div>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
              <div style={{ background:'#1a2a1a', borderRadius:8, padding:'10px 14px' }}>
                <div style={{ fontSize:10, color:'#5a7a5a', marginBottom:2 }}>✅ 支払済</div>
                <div style={{ fontSize:14, color:'#7aaa7a' }}>{fmt(paidAmount)}</div>
              </div>
              <div style={{ background:'#2a1a1a', borderRadius:8, padding:'10px 14px' }}>
                <div style={{ fontSize:10, color:'#aa6060', marginBottom:2 }}>⏳ 未払い</div>
                <div style={{ fontSize:14, color:'#e08080' }}>{fmt(unpaidAmount)}</div>
              </div>
            </div>
          </div>

          {!keySaved && (
            <div style={{ width:'100%', maxWidth:480, ...cs.card, border:'1px solid #c8a96e' }}>
              <div style={{ fontSize:12, color:'#c8a96e', marginBottom:10 }}>🔑 APIキーを入力してください</div>
              <input value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk-ant-api03-..." style={{ width:'100%', padding:'10px', background:'#0a0a0f', border:'1px solid #333', borderRadius:8, color:'#e8e4d9', fontSize:12, marginBottom:10 }} />
              <button onClick={saveKey} disabled={!apiKey} style={{ background:'#c8a96e', color:'#0a0a0f', border:'none', borderRadius:8, padding:'10px 20px', cursor:'pointer', fontSize:13, fontWeight:'bold' }}>保存して開始</button>
            </div>
          )}

          {keySaved && <>
            <div style={{ width:'100%', maxWidth:480, display:'flex', borderBottom:'1px solid #2a2a3a', marginBottom:20 }}>
              {[['upload','📸 追加'],['list',`📋 一覧(${records.length})`],['report','📊 レポート']].map(([k,l]) => (
                <button key={k} onClick={() => setTab(k)} style={{ flex:1, padding:'10px 4px', border:'none', background:'none', color: tab===k ? '#c8a96e' : '#555', borderBottom: tab===k ? '2px solid #c8a96e' : '2px solid transparent', cursor:'pointer', fontSize:12 }}>{l}</button>
              ))}
            </div>
            <div style={{ width:'100%', maxWidth:480 }}>

              {tab === 'upload' && <>
                {error && <div style={{ background:'#2a0a0a', border:'1px solid #a06060', borderRadius:10, padding:14, marginBottom:16, fontSize:12, color:'#e08080' }}>❌ {error}</div>}
                <div onClick={() => !loading && fileRef.current.click()} style={{ border:'2px dashed #333', borderRadius:16, padding:'48px 24px', textAlign:'center', cursor: loading ? 'wait' : 'pointer', background:'#111118', marginBottom:20 }}>
                  {loading
                    ? <><div style={{ fontSize:32, marginBottom:8 }}>🤖</div><div style={{ color:'#c8a96e', fontSize:14 }}>{loadingMsg || 'AI読み取り中...'}</div></>
                    : <><div style={{ fontSize:48, marginBottom:12 }}>📄</div><div style={{ fontSize:16, color:'#c8a96e', marginBottom:8 }}>タップしてファイルを選択</div><div style={{ fontSize:11, color:'#555', lineHeight:1.8 }}>📷 JPG / PNG（写真）<br/>📄 PDF（複数ページ対応）</div></>
                  }
                  <input ref={fileRef} type="file" accept="image/*,application/pdf" onChange={e => { process(e.target.files[0]); e.target.value=''; }} style={{ display:'none' }} />
                </div>
              </>}

              {tab === 'list' && <>
                <div style={{ display:'flex', gap:8, marginBottom:12, alignItems:'center' }}>
                  <div style={{ display:'flex', gap:4, flex:1 }}>
                    {[['all','すべて'],['unpaid','未払い'],['paid','支払済']].map(([k,l]) => (
                      <button key={k} onClick={() => setFilterStatus(k)} style={{ padding:'5px 10px', border:'none', borderRadius:8, background: filterStatus===k ? '#c8a96e' : '#1e1e2e', color: filterStatus===k ? '#0a0a0f' : '#888', cursor:'pointer', fontSize:11 }}>{l}</button>
                    ))}
                  </div>
                  <button onClick={exportCSV} style={{ background:'#1e1e2e', color:'#c8a96e', border:'1px solid #c8a96e', borderRadius:8, padding:'5px 12px', cursor:'pointer', fontSize:11 }}>📥 CSV</button>
                </div>
                {filteredRecords.length === 0
                  ? <div style={{ textAlign:'center', padding:'60px 0', color:'#444' }}><div style={{ fontSize:40, marginBottom:12 }}>🗂️</div>データがありません</div>
                  : filteredRecords.map(r => (
                    <div key={r.id} style={{ ...cs.card, padding:14, opacity: r.paid ? 0.7 : 1 }}>
                      <div style={{ display:'flex', gap:12 }}>
                        <img src={r.image} style={{ width:50, height:50, objectFit:'cover', borderRadius:8, flexShrink:0, border:'1px solid #2a2a3a' }} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ display:'flex', justifyContent:'space-between', marginBottom:3 }}>
                            <div style={{ fontSize:13, fontWeight:'bold', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:'55%', textDecoration: r.paid ? 'line-through' : 'none' }}>{r.vendor || '取引先不明'}</div>
                            <div style={{ fontSize:14, color:'#c8a96e' }}>{fmt(r.amount)}</div>
                          </div>
                          <div style={{ display:'flex', gap:6, flexWrap:'wrap', fontSize:10, marginBottom:6 }}>
                            <span style={{ color:'#666' }}>{r.date || '—'}</span>
                            {r.category && <span style={{ color:'#5a7a5a', background:'#1a2a1a', padding:'1px 6px', borderRadius:8 }}>{r.category}</span>}
                            {r.fileType && <span style={{ color:'#5a5a7a', background:'#1a1a2a', padding:'1px 6px', borderRadius:8 }}>{r.fileType}</span>}
                          </div>
                          <div style={{ display:'flex', gap:6 }}>
                            <button onClick={() => togglePaid(r.id)} style={{ flex:1, padding:'5px', border:'none', borderRadius:6, background: r.paid ? '#1a2a1a' : '#2a1a1a', color: r.paid ? '#7aaa7a' : '#e08080', cursor:'pointer', fontSize:11 }}>
                              {r.paid ? '✅ 支払済' : '⏳ 未払い'}
                            </button>
                            <button onClick={() => deleteRecord(r.id)} style={{ padding:'5px 10px', border:'none', borderRadius:6, background:'#2a1a1a', color:'#666', cursor:'pointer', fontSize:11 }}>🗑️</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  ))
                }
              </>}

              {tab === 'report' && <>
                <div style={{ ...cs.card, display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12, marginBottom:16 }}>
                  {[['件数',records.length+'件','📋'],['合計',fmt(totalAmount),'💴'],['未払い',fmt(unpaidAmount),'⏳']].map(([l,v,i]) => (
                    <div key={l} style={{ textAlign:'center' }}><div style={{ fontSize:20, marginBottom:4 }}>{i}</div><div style={{ fontSize:13, color:'#c8a96e' }}>{v}</div><div style={{ fontSize:10, color:'#555' }}>{l}</div></div>
                  ))}
                </div>
                <ChartComponent records={records} />
              </>}

            </div>
          </>}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
